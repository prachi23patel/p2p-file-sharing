<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — PeerDrop</title>
  <meta name="description" content="Create a PeerDrop account to start transferring files securely." />
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

  <!-- ── Auth Card ───────────────────────────────────────── -->
  <div class="auth-card" role="main">

    <!-- Brand -->
    <a href="login.html" class="brand" aria-label="PeerDrop home">
      <img src="assets/logo.svg" alt="" class="brand-logo" aria-hidden="true" />
      <span class="brand-name">PeerDrop</span>
    </a>

    <!-- Heading -->
    <h1 class="auth-title">Create account</h1>
    <p class="auth-subtitle">Join PeerDrop for free, no cloud required.</p>

    <!-- Error banner -->
    <div class="auth-error" id="auth-error" aria-live="polite">
      <svg fill="none" viewBox="0 0 16 16" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="8" cy="8" r="6"/>
        <path stroke-linecap="round" d="M8 5v3.5M8 11v.5"/>
      </svg>
      <span id="error-text"></span>
    </div>

    <!-- Form -->
    <form class="auth-form" id="register-form" novalidate>

      <!-- Username -->
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <div class="input-wrap">
          <input
            class="form-input"
            type="text"
            id="username"
            name="username"
            placeholder="peeruser"
            autocomplete="username"
            required
            minlength="3"
          />
        </div>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <div class="input-wrap">
          <input
            class="form-input"
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrap">
          <input
            class="form-input has-toggle"
            type="password"
            id="password"
            name="password"
            placeholder="Create a strong password"
            autocomplete="new-password"
            required
          />
          <!-- Show/hide toggle -->
          <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Show password">
            <svg class="icon-show" fill="none" viewBox="0 0 20 20" stroke="currentColor" stroke-width="1.7">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.5 10S5.5 4.5 10 4.5 17.5 10 17.5 10 14.5 15.5 10 15.5 2.5 10 2.5 10z"/>
              <circle cx="10" cy="10" r="2.5"/>
            </svg>
            <svg class="icon-hide" style="display:none" fill="none" viewBox="0 0 20 20" stroke="currentColor" stroke-width="1.7">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 3l14 14M8.46 8.52A2.5 2.5 0 0012.5 12.5M6 6.5C4.14 7.8 2.5 10 2.5 10S5.5 15.5 10 15.5c1.37 0 2.63-.43 3.72-1.13M10 4.5c4.5 0 7.5 5.5 7.5 5.5s-.78 1.42-2 2.7"/>
            </svg>
          </button>
        </div>

        <!-- Strength meter -->
        <div class="strength-meter" aria-label="Password strength">
          <div class="strength-bars" role="presentation">
            <div class="strength-bar"></div>
            <div class="strength-bar"></div>
            <div class="strength-bar"></div>
            <div class="strength-bar"></div>
          </div>
          <span class="strength-label" id="strength-label"></span>
        </div>
      </div>

      <!-- Confirm password -->
      <div class="form-group">
        <label class="form-label" for="confirm-password">Confirm Password</label>
        <div class="input-wrap">
          <input
            class="form-input has-toggle"
            type="password"
            id="confirm-password"
            name="confirm-password"
            placeholder="Repeat your password"
            autocomplete="new-password"
            required
          />
          <button type="button" class="pw-toggle" id="pw-confirm-toggle" aria-label="Show password">
            <svg class="icon-show" fill="none" viewBox="0 0 20 20" stroke="currentColor" stroke-width="1.7">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.5 10S5.5 4.5 10 4.5 17.5 10 17.5 10 14.5 15.5 10 15.5 2.5 10 2.5 10z"/>
              <circle cx="10" cy="10" r="2.5"/>
            </svg>
            <svg class="icon-hide" style="display:none" fill="none" viewBox="0 0 20 20" stroke="currentColor" stroke-width="1.7">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 3l14 14M8.46 8.52A2.5 2.5 0 0012.5 12.5M6 6.5C4.14 7.8 2.5 10 2.5 10S5.5 15.5 10 15.5c1.37 0 2.63-.43 3.72-1.13M10 4.5c4.5 0 7.5 5.5 7.5 5.5s-.78 1.42-2 2.7"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Submit -->
      <button class="btn-primary" type="submit" id="submit-btn">
        <div class="spinner" aria-hidden="true"></div>
        <span class="btn-text">Create account</span>
      </button>

    </form>

    <div class="auth-divider"></div>

    <!-- Footer link -->
    <p class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </p>

  </div><!-- /.auth-card -->

  <!-- ── Scripts ─────────────────────────────────────────── -->
  <script type="module" src="js/register.js"></script>

</body>
</html>
