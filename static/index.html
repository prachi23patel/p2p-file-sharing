
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P2P File Share</title>
<link rel="stylesheet" href="test1.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style >
  
</style>
</head>
<body>
<div class="wrap">
 
  <!-- HEADER -->
  <header>
    <div class="header-left">
      <div class="logo-mark">
        <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
          <circle cx="10" cy="10" r="3"/>
          <circle cx="3" cy="4" r="1.5"/>
          <circle cx="17" cy="4" r="1.5"/>
          <circle cx="3" cy="16" r="1.5"/>
          <circle cx="17" cy="16" r="1.5"/>
          <line x1="10" y1="7" x2="4" y2="4.8"/>
          <line x1="10" y1="7" x2="16" y2="4.8"/>
          <line x1="10" y1="13" x2="4" y2="15.2"/>
          <line x1="10" y1="13" x2="16" y2="15.2"/>
        </svg>
      </div>
      <div>
        <h1>P2P File Share</h1>
        <div class="tagline">Direct · Encrypted · Serverless</div>
      </div>
    </div>
    <div class="status-pill">
      <div id="statusDot"></div>
      <span id="statusPillText">Offline</span>
    </div>
  </header>
 
  <!-- ROOM CONTROLS -->
  <div class="rooms-grid section">
 
    <!-- CREATE ROOM -->
    <div class="card">
      <div class="card-header">
        <div class="card-header-icon">
          <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="2" width="12" height="12" rx="2"/><line x1="8" y1="5" x2="8" y2="11"/><line x1="5" y1="8" x2="11" y2="8"/></svg>
        </div>
        <span class="card-title">Create Room</span>
      </div>
      <div class="card-body">
        <div class="field">
          <label>Room ID <span style="color:var(--muted)"></span></label>
          <div class="field-row">
            <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="4" width="14" height="9" rx="2"/><path d="M5 4V3a3 3 0 016 0v1"/></svg>
            <input type="text" id="createRoomId" placeholder="auto-generate…" autocomplete="off">
          </div>
        </div>
        <div class="field">
          <label>Password <span style="color:var(--red)">*</span></label>
          <div class="field-row">
            <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="9" r="4"/><circle cx="8" cy="9" r="1" fill="currentColor" stroke="none"/><line x1="8" y1="5" x2="8" y2="2"/></svg>
            <input type="text" id="createPassword"  autocomplete="new-password">
          </div>
        </div>
        <button class="btn btn-primary" id="createBtn">
          <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><polyline points="1,9 6,14 15,3"/></svg>
          Create Room
        </button>
      </div>
    </div>
 
    <!-- JOIN ROOM -->
    <div class="card">
      <div class="card-header">
        <div class="card-header-icon">
          <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path d="M10 8H3"/><polyline points="6,5 3,8 6,11"/><path d="M6 3h7a1 1 0 011 1v8a1 1 0 01-1 1H6"/></svg>
        </div>
        <span class="card-title">Join Room</span>
      </div>
      <div class="card-body">
        <div class="field">
          <label>Room ID <span style="color:var(--red)">*</span></label>
          <div class="field-row">
            <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="4" width="14" height="9" rx="2"/><path d="M5 4V3a3 3 0 016 0v1"/></svg>
            <input type="text" id="roomInput" placeholder="Enter room ID…" autocomplete="off">
          </div>
        </div>
        <div class="field">
          <label>Password <span style="color:var(--red)">*</span></label>
          <div class="field-row">
            <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="9" r="4"/><circle cx="8" cy="9" r="1" fill="currentColor" stroke="none"/><line x1="8" y1="5" x2="8" y2="2"/></svg>
            <input type="password" id="joinPassword" placeholder="••••••••" autocomplete="new-password">
          </div>
        </div>
        <button class="btn btn-outline" id="joinBtn">
          <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path d="M10 8H3"/><polyline points="6,5 3,8 6,11"/><path d="M6 3h7a1 1 0 011 1v8a1 1 0 01-1 1H6"/></svg>
          Join Room
        </button>
      </div>
    </div>
  </div>
 
  <!-- CONNECTION STATUS -->
  <div class="card section status-card">
    <div class="status-row">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <span class="status-label">Status:</span>
        <span id="status">⬤ Not Connected</span>
        <div id="roomDisplay">
          <span class="status-label" style="margin:0">Room:</span>
          <span id="roomIdValue">—</span>
          <button class="copy-btn" id="copyRoomBtn" title="Copy Room ID" aria-label="Copy Room ID">
            <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><rect x="5" y="5" width="9" height="9" rx="1"/><path d="M11 5V3a1 1 0 00-1-1H3a1 1 0 00-1 1v7a1 1 0 001 1h2"/></svg>
          </button>
        </div>
      </div>
      <div class="peers-badge" id="peersBadge">
        <span class="peers-dot"></span>
        <span id="peersCount">0</span> peer(s)
      </div>
    </div>
  </div>
 
  <!-- CHAT -->
  <div class="card section">
    <div class="card-header">
      <div class="card-header-icon">
        <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path d="M14 10a1 1 0 01-1 1H5l-3 3V3a1 1 0 011-1h10a1 1 0 011 1z"/></svg>
      </div>
      <span class="card-title">Chat</span>
    </div>
    <div class="card-body">
      <div id="messages">
        <div class="empty-state">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          <span>Connect to a room to start chatting</span>
        </div>
      </div>
      <div class="chat-input-row">
        <div class="chat-input-wrap">
          <input type="text" id="messageInput" placeholder="Type a message…" disabled autocomplete="off">
          <!-- disabled -->
        </div>
        <button class="btn btn-primary btn-sm" id="sendBtn" disabled>
          <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><line x1="14" y1="2" x2="1" y2="8"/><line x1="14" y1="2" x2="6" y2="14"/><line x1="14" y1="2" x2="6" y2="9"/></svg>
          Send
        </button>
      </div>
    </div>
  </div>
 
  <!-- FILE TRANSFER -->
  <div class="card section">
    <div class="card-header">
      <div class="card-header-icon red">
        <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path d="M8 1v9"/><polyline points="5,7 8,10 11,7"/><path d="M3 12v1a1 1 0 001 1h8a1 1 0 001-1v-1"/></svg>
      </div>
      <span class="card-title">File Transfer</span>
      <span style="margin-left:auto;font-size:10px;color:var(--muted);letter-spacing:0.05em">Phase 4 Ready</span>
    </div>
    <div class="card-body">
      <div class="file-row">
        <input type="file" id="fileInput" disabled>
        <label for="fileInput" class="file-label-btn" id="fileLabelBtn">
          <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path d="M9 1H4a1 1 0 00-1 1v12a1 1 0 001 1h8a1 1 0 001-1V6z"/><polyline points="9,1 9,6 14,6"/></svg>
          Choose File
        </label>
        <span id="fileName">No file selected</span>
      </div>
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-meta">
          <span>Transferring…</span>
          <span id="progressPercent">0%</span>
        </div>
        <div class="progress-track">
          <div id="progressBar"></div>
        </div>
      </div>
      <button class="btn btn-danger btn-sm" id="cancelBtn" disabled style="margin-top:0">
        <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="8" r="7"/><line x1="5" y1="5" x2="11" y2="11"/><line x1="11" y1="5" x2="5" y2="11"/></svg>
        Cancel Transfer
      </button>
    </div>
  </div>
 
</div>
